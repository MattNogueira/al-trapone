name: Deploy AlTrapone

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: altrapone
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Define image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Upload production Compose file
        shell: bash
        run: |
          scp \
            -i ~/.ssh/id_ed25519 \
            -P "${{ secrets.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ./docker/docker-compose.yml.example \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apps/altrapone/docker-compose.yml.next"

      - name: Deploy exact image to VPS
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          printf -v remote_command 'IMAGE_REF=%q bash -s' "$IMAGE_REF"

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.VPS_SSH_PORT }}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "$remote_command" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          deploy_dir=/srv/apps/altrapone
          cd "$deploy_dir"
          umask 077

          if [ ! -f .env ]; then
            echo "ERRO: $deploy_dir/.env não existe." >&2
            exit 1
          fi

          if [ ! -f docker-compose.yml.next ]; then
            echo "ERRO: o novo arquivo Compose não foi recebido." >&2
            exit 1
          fi

          has_previous=false
          if [ -f docker-compose.yml ] && [ -f .deploy.env ]; then
            cp docker-compose.yml docker-compose.yml.previous
            cp .deploy.env .deploy.env.previous
            has_previous=true
          fi

          mv docker-compose.yml.next docker-compose.yml
          printf 'ALTRAPONE_IMAGE=%s\n' "$IMAGE_REF" > .deploy.env
          chmod 600 .deploy.env

          if docker compose --env-file .deploy.env config --quiet \
            && docker compose --env-file .deploy.env pull \
            && docker compose --env-file .deploy.env up \
              -d \
              --remove-orphans \
              --wait \
              --wait-timeout 60; then
            docker compose --env-file .deploy.env ps
            echo "Deploy concluído: $IMAGE_REF"
            exit 0
          fi

          echo "O novo deploy falhou." >&2

          if [ "$has_previous" = true ]; then
            echo "Restaurando a versão anterior..." >&2
            cp docker-compose.yml.previous docker-compose.yml
            cp .deploy.env.previous .deploy.env

            docker compose --env-file .deploy.env pull
            docker compose --env-file .deploy.env up \
              -d \
              --remove-orphans \
              --wait \
              --wait-timeout 60
            docker compose --env-file .deploy.env ps
            echo "Rollback concluído." >&2
          else
            echo "Não existe uma versão anterior para rollback." >&2
          fi

          exit 1
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/id_ed25519
